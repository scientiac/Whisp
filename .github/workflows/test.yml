name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build gettext desktop-file-utils appstream
        
    - name: Setup Meson
      run: meson setup builddir
        
    - name: Run Tests
      run: meson test -C builddir
